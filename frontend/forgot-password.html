<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | Class Orbit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset access to your Class Orbit account securely.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="Logo.PNG" type="image/png">
  <link rel="canonical" href="/forgot-password.html">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 76px);
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; justify-content: center; align-items: center; padding: 40px 20px;
    }
    .auth-card {
      background: #fff; padding: 36px 32px; width: 380px; max-width: 100%;
      border-radius: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
    }
    .auth-card .icon { font-size: 48px; margin-bottom: 12px; }
    .auth-card h2 { font-size: 22px; color: #003366; margin-bottom: 6px; }
    .auth-card p { color: #666; font-size: 14px; margin-bottom: 20px; }
    .auth-card input {
      width: 100%; padding: 12px 14px; margin: 8px 0;
      border: 1px solid #ddd; border-radius: 10px; outline: none;
      font-size: 14px; font-family: inherit;
    }
    .auth-card input:focus { border-color: #003366; }
    .auth-card button {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #003366, #0066cc);
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
      transition: 0.3s; font-family: inherit; margin-top: 10px;
    }
    .auth-card button:hover { transform: scale(1.03); }
    .auth-card .back-link { display: block; margin-top: 16px; color: #0066cc; font-size: 14px; }
    .success-msg { display: none; background: #e8f8ef; border: 1px solid #4caf50; color: #2e7d32; padding: 12px; border-radius: 8px; margin-top: 14px; font-size: 14px; }
  </style>
</head>
<body>

<header class="navbar" id="mainNav">
  <div class="logo"><a href="index.html"><img src="Logo.PNG" alt="Logo"></a></div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="student.html">Students</a>
    <a href="teacher.html">Teachers</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="login-btn">Login</a>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="icon">🔐</div>
    <h2>Forgot Password?</h2>
    <p>Apna registered email daalen. Hum aapko reset link bhejenge.</p>
    <input type="email" id="resetEmail" placeholder="Enter your email">
    <button onclick="sendReset()">Send Reset Link</button>
    <div class="success-msg" id="successMsg">
      ✅ Reset link bheja gaya! Apna email check karein.
    </div>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-bottom" style="border-top:none; padding: 20px 5%;">
    <div class="footer-left"><img src="Logo.PNG" alt="Logo"><span>Class Orbit</span></div>
    <div class="footer-right">© 2026 Class Orbit. All Rights Reserved</div>
  </div>
</footer>

<script>
document.getElementById('hamburger').addEventListener('click', function(){
  document.getElementById('navMenu').classList.toggle('open');
  this.classList.toggle('active');
});
async function sendReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email || !email.includes('@')) { alert('Valid email daalen!'); return; }
  try {
    const response = await fetch('/api/auth/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    });
    if (!response.ok) throw new Error('Request failed');
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('resetEmail').value = '';
  } catch (err) {
    alert('Reset request send nahi hui. Kripya dobara try karein.');
  }
}
async function resetFromLink() {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) return;
  const password = prompt('Apna naya password daalen (minimum 6 characters):');
  if (!password) return;
  try {
    const response = await fetch('/api/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, password })
    });
    const data = await response.json();
    alert(data.message);
    if (response.ok) window.location.href = 'login.html';
  } catch (error) {
    alert('Password reset nahi hua. Kripya dobara try karein.');
  }
}
resetFromLink();
</script>
</body>
</html>
